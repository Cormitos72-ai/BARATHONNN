<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Barathon Cusco</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #fdf6ec;
    --surface:  #fff8f0;
    --card:     #ffffff;
    --ink:      #1a1208;
    --ink2:     #3d2e18;
    --muted:    #9a8570;
    --border:   #e8d9c5;
    --amber:    #d97706;
    --amber-lt: #fef3c7;
    --orange:   #ea580c;
    --green:    #16a34a;
    --green-lt: #dcfce7;
    --red:      #dc2626;
    --line:     #d97706;
  }

- { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
background: var(–bg);
color: var(–ink);
font-family: ‘Nunito’, sans-serif;
min-height: 100vh;
overflow-x: hidden;
}

/* ─── noise texture overlay ─── */
body::before {
content: ‘’;
position: fixed;
inset: 0;
background-image: url(“data:image/svg+xml,%3Csvg viewBox=‘0 0 256 256’ xmlns=‘http://www.w3.org/2000/svg’%3E%3Cfilter id=‘n’%3E%3CfeTurbulence type=‘fractalNoise’ baseFrequency=‘0.9’ numOctaves=‘4’ stitchTiles=‘stitch’/%3E%3C/filter%3E%3Crect width=‘100%25’ height=‘100%25’ filter=‘url(%23n)’ opacity=‘0.04’/%3E%3C/svg%3E”);
pointer-events: none;
z-index: 0;
opacity: 0.5;
}

/* ══════════ SETUP ══════════ */
#setup {
position: relative;
z-index: 1;
min-height: 100vh;
display: flex;
flex-direction: column;
padding: 36px 22px 44px;
}

.logo {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 4rem;
letter-spacing: 0.04em;
line-height: 0.9;
color: var(–ink);
margin-bottom: 2px;
}
.logo span { color: var(–amber); }

.city-pill {
display: inline-flex;
align-items: center;
gap: 5px;
background: var(–amber);
border-radius: 6px;
padding: 3px 10px;
font-size: 0.7rem;
font-weight: 800;
color: #fff;
text-transform: uppercase;
letter-spacing: 0.08em;
margin-bottom: 36px;
}

.sec-label {
font-size: 0.65rem;
font-weight: 900;
letter-spacing: 0.16em;
text-transform: uppercase;
color: var(–muted);
margin-bottom: 16px;
}

/* timeline setup */
.setup-timeline {
position: relative;
padding-left: 40px;
margin-bottom: 16px;
}

.setup-timeline::before {
content: ‘’;
position: absolute;
left: 13px;
top: 18px;
bottom: 18px;
width: 2px;
background: var(–border);
border-radius: 99px;
}

.setup-item {
position: relative;
margin-bottom: 10px;
animation: slideIn 0.2s ease both;
}

.setup-dot {
position: absolute;
left: -30px;
top: 50%;
transform: translateY(-50%);
width: 14px;
height: 14px;
border-radius: 50%;
background: var(–border);
border: 3px solid var(–bg);
box-shadow: 0 0 0 2px var(–border);
transition: all 0.2s;
z-index: 1;
}
.setup-item.filled .setup-dot {
background: var(–amber);
box-shadow: 0 0 0 2px var(–amber);
}

.setup-row {
display: flex;
align-items: center;
gap: 10px;
background: var(–card);
border: 2px solid var(–border);
border-radius: 14px;
padding: 12px 14px;
box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}
.setup-item.filled .setup-row {
border-color: var(–amber);
}

.setup-num {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 1.1rem;
color: var(–amber);
min-width: 24px;
letter-spacing: 0.04em;
}

.setup-row input {
flex: 1;
background: transparent;
border: none;
outline: none;
color: var(–ink);
font-family: ‘Nunito’, sans-serif;
font-size: 0.95rem;
font-weight: 700;
}
.setup-row input::placeholder { color: var(–muted); font-weight: 600; }

.del-btn {
background: none;
border: none;
color: var(–muted);
cursor: pointer;
font-size: 1.1rem;
padding: 4px;
line-height: 1;
}

@keyframes slideIn {
from { opacity: 0; transform: translateX(-10px); }
to   { opacity: 1; transform: translateX(0); }
}

.add-btn {
display: flex;
align-items: center;
gap: 8px;
background: none;
border: 2px dashed var(–border);
border-radius: 12px;
padding: 11px 16px;
color: var(–muted);
font-family: ‘Nunito’, sans-serif;
font-size: 0.88rem;
font-weight: 700;
cursor: pointer;
width: calc(100% - 40px);
margin-left: 40px;
margin-bottom: 32px;
}

.start-btn {
background: var(–ink);
color: var(–bg);
border: none;
border-radius: 16px;
padding: 18px;
font-family: ‘Bebas Neue’, sans-serif;
font-size: 1.4rem;
letter-spacing: 0.06em;
cursor: pointer;
width: 100%;
margin-top: auto;
box-shadow: 0 4px 20px rgba(26,18,8,0.2);
transition: transform 0.1s;
}
.start-btn:disabled { opacity: 0.3; }
.start-btn:active { transform: scale(0.98); }

/* ══════════ MARATHON ══════════ */
#marathon {
position: relative;
z-index: 1;
display: none;
min-height: 100vh;
flex-direction: column;
padding-bottom: 40px;
}

.m-header {
display: flex;
align-items: center;
justify-content: space-between;
padding: 22px 22px 0;
margin-bottom: 18px;
}

.m-logo {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 1.8rem;
letter-spacing: 0.04em;
color: var(–ink);
}
.m-logo span { color: var(–amber); }

.m-timer {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 1.1rem;
letter-spacing: 0.08em;
color: var(–ink2);
background: var(–card);
padding: 5px 12px;
border-radius: 8px;
border: 2px solid var(–border);
}

.m-progress { padding: 0 22px 20px; }

.m-prog-info {
display: flex;
justify-content: space-between;
align-items: baseline;
margin-bottom: 7px;
}

.m-prog-label {
font-size: 0.65rem;
font-weight: 900;
letter-spacing: 0.14em;
text-transform: uppercase;
color: var(–muted);
}

.m-prog-count {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 1rem;
letter-spacing: 0.04em;
color: var(–ink2);
}
.m-prog-count em { color: var(–amber); font-style: normal; }

.m-prog-track {
height: 6px;
background: var(–border);
border-radius: 99px;
overflow: hidden;
}

.m-prog-fill {
height: 100%;
background: linear-gradient(90deg, var(–orange), var(–amber));
border-radius: 99px;
transition: width 0.6s cubic-bezier(0.34,1.56,0.64,1);
}

/* Current card */
.m-current { padding: 0 22px 24px; }

.m-current-label {
font-size: 0.62rem;
font-weight: 900;
letter-spacing: 0.16em;
text-transform: uppercase;
color: var(–amber);
margin-bottom: 8px;
}

.m-card {
background: var(–ink);
border-radius: 22px;
padding: 22px;
position: relative;
overflow: hidden;
box-shadow: 0 8px 32px rgba(26,18,8,0.18);
animation: cardIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
}

@keyframes cardIn {
from { opacity: 0; transform: scale(0.93) translateY(12px); }
to   { opacity: 1; transform: scale(1) translateY(0); }
}

/* diagonal stripe decoration */
.m-card::before {
content: ‘’;
position: absolute;
top: -30px; right: -30px;
width: 120px; height: 120px;
background: var(–amber);
opacity: 0.12;
border-radius: 30px;
transform: rotate(20deg);
}

.m-card-bg-num {
position: absolute;
bottom: -8px; right: 14px;
font-family: ‘Bebas Neue’, sans-serif;
font-size: 6rem;
line-height: 1;
color: #fff;
opacity: 0.06;
user-select: none;
}

.m-bar-name {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 1.9rem;
letter-spacing: 0.03em;
line-height: 1.05;
color: #fff;
display: block;
text-decoration: none;
padding-right: 40px;
margin-bottom: 4px;
}

.m-gps-hint {
font-size: 0.72rem;
font-weight: 700;
color: var(–amber);
margin-bottom: 16px;
opacity: 0.85;
}

.m-checkin {
display: flex;
align-items: center;
justify-content: center;
gap: 8px;
background: var(–amber);
color: var(–ink);
border: none;
border-radius: 12px;
padding: 14px;
font-family: ‘Bebas Neue’, sans-serif;
font-size: 1.15rem;
letter-spacing: 0.06em;
cursor: pointer;
width: 100%;
box-shadow: 0 4px 14px rgba(217,119,6,0.35);
transition: transform 0.1s;
}
.m-checkin:active { transform: scale(0.97); }

/* Timeline */
.m-timeline-wrap { padding: 0 22px; }

.m-tl-label {
font-size: 0.62rem;
font-weight: 900;
letter-spacing: 0.16em;
text-transform: uppercase;
color: var(–muted);
margin-bottom: 16px;
}

.m-timeline {
position: relative;
padding-left: 34px;
}

.m-timeline::before {
content: ‘’;
position: absolute;
left: 11px; top: 8px; bottom: 8px;
width: 2px;
background: var(–border);
border-radius: 99px;
}

.m-timeline-filled {
position: absolute;
left: 11px; top: 8px;
width: 2px;
background: linear-gradient(180deg, var(–orange), var(–amber));
border-radius: 99px;
transition: height 0.6s cubic-bezier(0.34,1.56,0.64,1);
z-index: 1;
}

.m-tl-item {
position: relative;
margin-bottom: 10px;
display: flex;
align-items: center;
gap: 12px;
}

.m-tl-dot {
position: absolute;
left: -26px;
width: 14px; height: 14px;
border-radius: 50%;
border: 3px solid var(–border);
background: var(–bg);
z-index: 2;
transition: all 0.3s ease;
}

.m-tl-item.done .m-tl-dot {
background: var(–green);
border-color: var(–green);
box-shadow: 0 0 0 4px rgba(22,163,74,0.15);
}

.m-tl-item.active .m-tl-dot {
background: var(–amber);
border-color: var(–amber);
box-shadow: 0 0 0 4px rgba(217,119,6,0.2);
animation: pulse 2s infinite;
}

.m-tl-item.locked .m-tl-dot {
background: var(–border);
border-color: var(–border);
}

@keyframes pulse {
0%,100% { box-shadow: 0 0 0 4px rgba(217,119,6,0.2); }
50%      { box-shadow: 0 0 0 9px rgba(217,119,6,0.06); }
}

.m-tl-content {
flex: 1;
padding: 10px 14px;
border-radius: 13px;
border: 2px solid transparent;
transition: all 0.3s ease;
}

.m-tl-item.done .m-tl-content {
background: var(–green-lt);
border-color: #bbf7d0;
}

.m-tl-item.active .m-tl-content {
background: var(–card);
border-color: var(–amber);
box-shadow: 0 2px 12px rgba(217,119,6,0.1);
}

.m-tl-item.locked .m-tl-content {
background: var(–surface);
border-color: var(–border);
opacity: 0.5;
}

.m-tl-num {
font-size: 0.62rem;
font-weight: 900;
letter-spacing: 0.12em;
text-transform: uppercase;
margin-bottom: 1px;
}
.m-tl-item.done   .m-tl-num { color: var(–green); }
.m-tl-item.active .m-tl-num { color: var(–amber); }
.m-tl-item.locked .m-tl-num { color: var(–muted); }

.m-tl-name {
font-family: ‘Nunito’, sans-serif;
font-weight: 800;
font-size: 0.92rem;
text-decoration: none;
display: block;
}
.m-tl-item.done   .m-tl-name { color: var(–green); text-decoration: line-through; text-decoration-color: rgba(22,163,74,0.4); }
.m-tl-item.active .m-tl-name { color: var(–ink); }
.m-tl-item.locked .m-tl-name { color: var(–muted); pointer-events: none; }

/* ══════════ CELEBRATION ══════════ */
#celebration {
display: none;
position: fixed;
inset: 0;
background: rgba(253,246,236,0.96);
z-index: 100;
flex-direction: column;
align-items: center;
justify-content: center;
text-align: center;
padding: 36px 28px;
animation: fadeIn 0.3s ease;
}

@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

.cel-emoji {
font-size: 4rem;
margin-bottom: 14px;
animation: bounceIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
}

@keyframes bounceIn {
from { transform: scale(0) rotate(-15deg); }
to   { transform: scale(1) rotate(0); }
}

.cel-title {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 2.8rem;
letter-spacing: 0.04em;
color: var(–ink);
margin-bottom: 6px;
line-height: 1;
}
.cel-title span { color: var(–amber); }

.cel-next-label {
font-size: 0.65rem;
font-weight: 900;
letter-spacing: 0.14em;
text-transform: uppercase;
color: var(–muted);
margin-bottom: 10px;
margin-top: 20px;
}

.cel-next-name {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 1.5rem;
letter-spacing: 0.04em;
color: var(–ink);
padding: 14px 20px;
background: var(–card);
border-radius: 14px;
border: 2px solid var(–amber);
width: 100%;
text-decoration: none;
display: block;
margin-bottom: 24px;
box-shadow: 0 4px 16px rgba(217,119,6,0.12);
}

.cel-btn {
background: var(–ink);
color: var(–bg);
border: none;
border-radius: 14px;
padding: 16px 32px;
font-family: ‘Bebas Neue’, sans-serif;
font-size: 1.2rem;
letter-spacing: 0.06em;
cursor: pointer;
width: 100%;
box-shadow: 0 4px 16px rgba(26,18,8,0.15);
}

/* ══════════ FINISH ══════════ */
#finish {
position: relative; z-index: 1;
display: none;
min-height: 100vh;
flex-direction: column;
align-items: center;
justify-content: center;
padding: 40px 24px;
text-align: center;
}

.fin-trophy {
font-size: 5rem;
margin-bottom: 20px;
animation: bounceIn 0.8s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
}

.fin-title {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 3rem;
letter-spacing: 0.04em;
line-height: 1;
color: var(–ink);
margin-bottom: 10px;
}
.fin-title span { color: var(–amber); }

.fin-sub { color: var(–muted); font-size: 0.9rem; font-weight: 700; margin-bottom: 8px; }

.fin-count {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 5rem;
color: var(–amber);
line-height: 1;
margin-bottom: 2px;
}

.fin-count-label { color: var(–muted); font-size: 0.88rem; font-weight: 700; margin-bottom: 8px; }

.fin-time {
font-weight: 800;
font-size: 0.9rem;
color: var(–muted);
margin-bottom: 36px;
}
.fin-time strong { color: var(–ink); }

.restart-btn {
background: transparent;
border: 2px solid var(–border);
color: var(–ink2);
border-radius: 14px;
padding: 14px 28px;
font-family: ‘Bebas Neue’, sans-serif;
font-size: 1.1rem;
letter-spacing: 0.06em;
cursor: pointer;
}

.confetti-piece {
position: fixed;
width: 8px; height: 8px;
border-radius: 2px;
animation: confettiFall linear forwards;
pointer-events: none;
z-index: 200;
}
@keyframes confettiFall {
0%   { transform: translateY(-20px) rotate(0deg);   opacity: 1; }
100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}
</style>

</head>
<body>

<!-- ══════════ SETUP ══════════ -->

<div id="setup">
  <div class="logo">BARA<span>THON</span></div>
  <div class="city-pill">📍 Cusco, Pérou</div>
  <div class="sec-label">Parcours du soir</div>
  <div class="setup-timeline" id="setupTimeline"></div>
  <button class="add-btn" onclick="addBar()">＋ &nbsp;Ajouter un bar</button>
  <button class="start-btn" id="startBtn" onclick="startMarathon()" disabled>LANCER LE BARATHON →</button>
</div>

<!-- ══════════ MARATHON ══════════ -->

<div id="marathon">
  <div class="m-header">
    <div class="m-logo">BARA<span>THON</span></div>
    <div class="m-timer" id="mTimer">00:00</div>
  </div>
  <div class="m-progress">
    <div class="m-prog-info">
      <span class="m-prog-label">Progression</span>
      <span class="m-prog-count" id="mProgCount"><em>0</em> / 7</span>
    </div>
    <div class="m-prog-track"><div class="m-prog-fill" id="mProgFill" style="width:0%"></div></div>
  </div>
  <div class="m-current">
    <div class="m-current-label">📍 Stop actuel</div>
    <div class="m-card" id="mCard">
      <div class="m-card-bg-num" id="mCardNum">1</div>
      <a class="m-bar-name" id="mBarName" href="#">—</a>
      <div class="m-gps-hint">🗺️ Appuie sur le nom pour ouvrir Maps</div>
      <button class="m-checkin" onclick="checkIn()">✓ &nbsp;CHECK-IN ICI</button>
    </div>
  </div>
  <div class="m-timeline-wrap">
    <div class="m-tl-label">Tracé du barathon</div>
    <div class="m-timeline" id="mTimeline">
      <div class="m-timeline-filled" id="mTimelineFilled" style="height:0"></div>
    </div>
  </div>
</div>

<!-- ══════════ CELEBRATION ══════════ -->

<div id="celebration">
  <div class="cel-emoji" id="celEmoji">🍻</div>
  <div class="cel-title">CHECK-IN <span>VALIDÉ !</span></div>
  <div class="cel-next-label">Prochain stop — appuie pour Maps</div>
  <a class="cel-next-name" id="celNextName" href="#">—</a>
  <button class="cel-btn" onclick="closeCel()">ON Y VA →</button>
</div>

<!-- ══════════ FINISH ══════════ -->

<div id="finish">
  <div class="fin-trophy">🏆</div>
  <div class="fin-title">BARATHON<br><span>TERMINÉ !</span></div>
  <div class="fin-sub">Tu as survécu à</div>
  <div class="fin-count" id="finCount">7</div>
  <div class="fin-count-label">bars à Cusco 🍺</div>
  <div class="fin-time" id="finTime">Temps total : <strong>—</strong></div>
  <button class="restart-btn" onclick="restart()">RECOMMENCER</button>
</div>

<script>
const BARS = [
  { name: "ViewHouse Resto Bar", lat: -13.5156, lng: -71.9785 },
  { name: "Black Cat Bar",       lat: -13.5166, lng: -71.9784 },
  { name: "Molly's Irish Bar",   lat: -13.5161, lng: -71.9787 },
  { name: "Paddy's Irish Pub",   lat: -13.5163, lng: -71.9783 },
  { name: "7 Vidas Taproom",     lat: -13.5170, lng: -71.9790 },
  { name: "Ukukus Club",         lat: -13.5168, lng: -71.9786 },
  { name: "Chango Club Cuzco",   lat: -13.5171, lng: -71.9793 },
];

let bars = [];
let currentIndex = 0;
let completedCount = 0;
let startTime = null;
let timerInterval = null;

window.onload = () => {
  bars = BARS.map((b, i) => ({ ...b, id: i }));
  renderSetup();
};

function mapsUrl(i) {
  const b = bars[i];
  return `https://maps.google.com/?q=${b.lat},${b.lng}`;
}

/* ── SETUP ── */
function addBar() {
  bars.push({ id: bars.length, name: '', lat: -13.516, lng: -71.979 });
  renderSetup();
}

function removeBar(id) {
  if (bars.length <= 1) return;
  bars = bars.filter(b => b.id !== id);
  bars.forEach((b, i) => b.id = i);
  renderSetup();
}

function renderSetup() {
  const tl = document.getElementById('setupTimeline');
  tl.innerHTML = '';
  bars.forEach((bar, i) => {
    const item = document.createElement('div');
    item.className = 'setup-item' + (bar.name ? ' filled' : '');
    item.style.animationDelay = (i * 0.03) + 's';
    item.innerHTML = `
      <div class="setup-dot"></div>
      <div class="setup-row">
        <span class="setup-num">${String(i+1).padStart(2,'0')}</span>
        <input type="text" value="${bar.name}" placeholder="Nom du bar..."
          oninput="bars[${i}].name=this.value.trim();
                   document.getElementById('startBtn').disabled=bars.filter(b=>b.name).length<2;
                   this.closest('.setup-item').className='setup-item'+(this.value?' filled':'')">
        <button class="del-btn" onclick="removeBar(${bar.id})">×</button>
      </div>
    `;
    tl.appendChild(item);
  });
  document.getElementById('startBtn').disabled = bars.filter(b => b.name).length < 2;
}

/* ── MARATHON ── */
function startMarathon() {
  bars = bars.filter(b => b.name);
  if (bars.length < 2) return;
  currentIndex = 0; completedCount = 0; startTime = Date.now();
  document.getElementById('setup').style.display = 'none';
  document.getElementById('marathon').style.display = 'flex';
  timerInterval = setInterval(updateTimer, 1000);
  renderMarathon();
}

function renderMarathon() {
  document.getElementById('mProgCount').innerHTML = `<em>${completedCount}</em> / ${bars.length}`;
  document.getElementById('mProgFill').style.width = `${(completedCount / bars.length) * 100}%`;
  const bar = bars[currentIndex];
  document.getElementById('mCardNum').textContent = currentIndex + 1;
  const nameEl = document.getElementById('mBarName');
  nameEl.textContent = bar.name;
  nameEl.onclick = (e) => { e.preventDefault(); window.open(mapsUrl(currentIndex), '_blank'); };
  const card = document.getElementById('mCard');
  card.style.animation = 'none'; card.offsetHeight;
  card.style.animation = 'cardIn 0.4s cubic-bezier(0.34,1.56,0.64,1)';
  renderTimeline();
}

function renderTimeline() {
  const tl = document.getElementById('mTimeline');
  const filled = document.getElementById('mTimelineFilled');
  Array.from(tl.children).forEach(c => { if (c !== filled) c.remove(); });

  bars.forEach((bar, i) => {
    const state = i < currentIndex ? 'done' : i === currentIndex ? 'active' : 'locked';
    const item = document.createElement('div');
    item.className = `m-tl-item ${state}`;
    const canTap = i <= currentIndex;
    item.innerHTML = `
      <div class="m-tl-dot"></div>
      <div class="m-tl-content">
        <div class="m-tl-num">STOP ${String(i+1).padStart(2,'0')}</div>
        <a class="m-tl-name" href="#" style="${canTap ? '' : 'pointer-events:none'}">${bar.name}</a>
      </div>
    `;
    if (canTap) {
      item.querySelector('.m-tl-name').addEventListener('click', (e) => {
        e.preventDefault(); window.open(mapsUrl(i), '_blank');
      });
    }
    tl.appendChild(item);
  });

  setTimeout(() => {
    const items = tl.querySelectorAll('.m-tl-item');
    if (!items.length || currentIndex === 0) { filled.style.height = '0px'; return; }
    const tlRect = tl.getBoundingClientRect();
    const dot = items[currentIndex - 1].querySelector('.m-tl-dot');
    filled.style.height = (dot.getBoundingClientRect().top - tlRect.top + 7) + 'px';
  }, 60);
}

function checkIn() {
  completedCount++;
  const isLast = currentIndex === bars.length - 1;
  if (isLast) {
    launchConfetti();
    setTimeout(() => {
      clearInterval(timerInterval);
      document.getElementById('marathon').style.display = 'none';
      document.getElementById('finish').style.display = 'flex';
      document.getElementById('finCount').textContent = bars.length;
      document.getElementById('finTime').innerHTML =
        `Temps total : <strong>${fmt(Math.floor((Date.now()-startTime)/1000))}</strong>`;
    }, 500);
    return;
  }
  currentIndex++;
  renderMarathon();
  const emojis = ['🍻','🎉','⚡','🔥','💥','🙌','🥂','🎊'];
  document.getElementById('celEmoji').textContent = emojis[Math.floor(Math.random()*emojis.length)];
  const cel = document.getElementById('celNextName');
  cel.textContent = bars[currentIndex].name;
  cel.onclick = (e) => { e.preventDefault(); window.open(mapsUrl(currentIndex), '_blank'); };
  document.getElementById('celebration').style.display = 'flex';
}

function closeCel() { document.getElementById('celebration').style.display = 'none'; }

function updateTimer() {
  if (startTime) document.getElementById('mTimer').textContent =
    fmt(Math.floor((Date.now()-startTime)/1000));
}

function fmt(s) {
  const p = n => String(n).padStart(2,'0');
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
  return h > 0 ? `${p(h)}:${p(m)}:${p(sec)}` : `${p(m)}:${p(sec)}`;
}

function launchConfetti() {
  const colors = ['#d97706','#ea580c','#16a34a','#dc2626','#2563eb','#9333ea'];
  for (let i=0; i<80; i++) setTimeout(() => {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.cssText = `left:${Math.random()*100}vw;background:${colors[Math.floor(Math.random()*colors.length)]};animation-duration:${1.5+Math.random()*2}s`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }, i * 22);
}

function restart() {
  clearInterval(timerInterval);
  bars = BARS.map((b,i) => ({...b,id:i}));
  currentIndex=0; completedCount=0; startTime=null;
  document.getElementById('finish').style.display = 'none';
  document.getElementById('setup').style.display = 'flex';
  renderSetup();
}
</script>

</body>
